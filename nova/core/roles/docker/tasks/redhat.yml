---
- name: Adding Docker repository for {{ ansible_facts.distribution }}...
  ansible.builtin.yum_repository:
    name: docker-ce-stable
    description: Docker CE Stable - $basearch
    baseurl: "{{ docker_rhel_dnf_proxy }}/{{ ansible_facts.distribution_major_version }}/$basearch/stable"
    enabled: true
    gpgcheck: true
    gpgkey: "{{ docker_rhel_dnf_proxy }}/gpg"

- name: Installing Docker and requirements...
  ansible.builtin.dnf:
    name:
      - containerd.io
      - docker-ce-cli{{ '-' + docker_engine_version | string + '*' if docker_engine_version != {} else '' }}
      - docker-ce{{ '-' + docker_engine_version | string + '*' if docker_engine_version != {} else '' }}
      - docker-compose-plugin
      - python3-pip
      - python3-requests
      - python3-setuptools
    state: present
    allow_downgrade: true
    update_cache: true
