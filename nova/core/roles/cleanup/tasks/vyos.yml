---
- name: Running commands over SSH...
  vars:
    ansible_become: true
    ansible_connection: ansible.builtin.ssh
  block:
    - name: Cleaning up Vyos logs...
      ansible.builtin.command: "{{ logs }}"
      loop_control:
        loop_var: logs
      loop:
        - rm -rf /config/archive/*
        - rm -rf /var/log/*
        - rm -rf /tmp/*
        - mkdir -p /var/log/nginx
        - journalctl --vacuum-time=1seconds
      changed_when: true

    - name: Cleaning user history...
      ansible.builtin.file:
        path:
          - "{{ user_logs }}/.*history"
          - "{{ user_logs }}/.ansible"
          - "{{ user_logs }}/.lesshst"
        state: absent
      loop_control:
        loop_var: user_logs
      loop:
        - /root
        - /home/gt
        - /home/vyos

    - name: Rebooting... # VyOS always requires a reboot
      ansible.builtin.reboot:
