---
- name: NO UNDEPLOY
  ansible.builtin.fail:
    msg: "{{ inventory_hostname }} Has no_undeploy set and won't be removed"
  when: no_undeploy or ['no_undeploy', 'custom_no_undeploy'] | intersect(group_names) | length > 0

- name: Removing machine...
  when: proxmox_vm_exists.proxmox_vms != []
  become: false
  delegate_to: localhost
  block:
    - name: Removing cloning limiter file...
      ansible.builtin.file:
        path: /tmp/proxmox_vm_clone_{{ project_fullname | default('') }}_{{ inventory_hostname }}.done
        state: absent

    # Stopping the VM before removing it, since it's much faster this way
    # Also the community.proxmox.proxmox_kvm module stopped actually means shutdown
    - name: Stopping {{ custom_vm_name | default(vm_name) }}...
      ansible.builtin.uri:
        url: "{{ proxmox_api_url }}/nodes/{{ proxmox_vm_exists.proxmox_vms[0].node }}/qemu/{{ proxmox_vm_exists.proxmox_vms[0].vmid }}/status/stop"
        headers:
          Authorization: PVEAPIToken={{ proxmox_defaults.api_user }}!{{ proxmox_defaults.api_token_id }}={{ proxmox_defaults.api_token_secret }}
        method: POST
        validate_certs: "{{ proxmox_defaults.validate_certs }}"
        timeout: "{{ proxmox_machine_operations_operation_timeout }}"
      retries: 6

    # Using custom timeout value here since on mass remove some VMs will be stuck getting storage lock
    # Since we're using retries we don't need to use the default long time and can fail and recover fast with the retries
    - name: Removing {{ custom_vm_name | default(vm_name) }} VM...
      community.proxmox.proxmox_kvm:
        name: "{{ custom_vm_name | default(vm_name) }}"
        vmid: "{{ proxmox_vm_exists.proxmox_vms[0].vmid | default(machine_operations_proxmox_vmid) }}"
        destroy_unreferenced_disks: true
        force: true
        purge: true
        state: absent
        timeout: 30
      retries: 5

- name: Removing unreferenced disks...
  become: false
  delegate_to: localhost
  block:
    # Sometimes during high load the unreferenced disk cleanup can fail in the previous task
    # So checking if there are unreferenced disks and trying to remove them before finishing the play
    - name: Listing {{ custom_vm_name | default(vm_name) }} unreferenced disks...
      community.proxmox.proxmox_storage_contents_info:
        storage: "{{ proxmox_storage }}"
        node: "{{ proxmox_vm_exists.proxmox_vms[0].node | default(proxmox_node) }}"
        vmid: "{{ proxmox_vm_exists.proxmox_vms[0].vmid | default(machine_operations_proxmox_vmid) }}"
        validate_certs: "{{ proxmox_validate_certs }}"
      retries: 12
      delay: 5
      register: proxmox_unreferenced_disks

    - name: Removing following {{ custom_vm_name | default(vm_name) }} unreferenced disks...
      ansible.builtin.uri:
        url:
          "{{ proxmox_api_url }}/nodes/{{ proxmox_vm_exists.proxmox_vms[0].node
          | default(proxmox_node) }}/storage/{{ proxmox_storage }}/content/{{ disk.volid }}"
        headers:
          Authorization: PVEAPIToken={{ proxmox_defaults.api_user }}!{{ proxmox_defaults.api_token_id }}={{ proxmox_defaults.api_token_secret }}
        method: DELETE
        validate_certs: "{{ proxmox_validate_certs }}"
      loop_control:
        loop_var: disk
        label: "{{ disk.volid }}"
      loop: "{{ proxmox_unreferenced_disks.proxmox_storage_content }}"
      when: proxmox_unreferenced_disks.proxmox_storage_content != []
      retries: 12
      delay: 5

    - name: Re-including remove tasks...
      ansible.builtin.include_tasks: remove.yml
      when: proxmox_unreferenced_disks.proxmox_storage_content != []

- name: Stopping play...
  ansible.builtin.meta: end_host
  when: deploy_mode == 'undeploy'
