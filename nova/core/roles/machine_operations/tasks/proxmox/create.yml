---
- name: Checking for the correct deploy mode...
  ansible.builtin.fail:
    msg: |
      "{{ custom_vm_name | default(vm_name) }} Virtual Machine doesn't exist, use the deploy command first!"
  when:
    - fresh_deploy is ansible.builtin.truthy
    - role_only is ansible.builtin.truthy
      or role_only_wp is ansible.builtin.truthy
      or single_role is defined

- name: Cloning and configuring VM...
  delegate_to: localhost
  become: false
  block:
    - name: Looking up template and cloning the VM...
      when: fresh_deploy
      block:
        - name: Checking for IP conflict for non-automatic IP assignment...
          when: connection_mode not in ['ipv4_dhcp', 'ipv6_dhcp', 'ipv6_slaac'] # The list of connection modes are the ones that are available in Providentia
          block:
            - name: Checking that nothing is already responding on {{ connection_address }}... # noqa: command-instead-of-shell
              ansible.builtin.shell: "{{ lookup('ansible.builtin.template', 'Test-IPAddress.sh') }}"
              register: response
              failed_when: not (response.stdout is search("received.*packet"))
              changed_when: false

            - name: ADDRESS ALREADY IN USE
              ansible.builtin.fail:
                msg: |
                  Looks like the address {{ connection_address }} is already in use!
                  Cannot continue deploying {{ custom_vm_name | default(vm_name) }} to avoid IP conflicts!
                  Check the VM management platform to if another device is using the same IP address.
              when: not (response.stdout is search("100.*packet loss"))

        - name: Looking up {{ vm_template }} info...
          community.proxmox.proxmox_vm_info:
            name: "{{ vm_template }}"
          register: proxmox_vm_template
          until: proxmox_vm_template is not failed
          retries: 24
          delay: 5

        - name: MISSING TEMPLATE
          ansible.builtin.fail:
            msg: |
              Error following template not found:
                vm_template: {{ vm_template }}
          when: proxmox_vm_template.proxmox_vms == []

        # Excluding failed hosts and non-Proxmox hosts to get a list of available hosts still in play
        - name: Getting available play hosts...
          ansible.builtin.set_fact:
            available_play_hosts: "{{ available_play_hosts | default([]) + [pmx_deploy_host] }}"
          loop_control:
            loop_var: pmx_deploy_host
          loop: "{{ ansible_play_batch | difference(ansible_failed_hosts | default([])) | sort }}"
          when: hostvars[pmx_deploy_host].infra_env | default('') == 'proxmox'

        # Since Proxmox doesn't support locking or queuing operations, creating a limiter file
        # to make sure only one host in the batch is cloning at a time
        # After cloning is done the hosts will go back to the default parallelism
        - name: Waiting for previous host in the batch to finish cloning...
          block:
            - name: Waiting until the previous VM is the batch cloned...
              when: available_play_hosts.index(inventory_hostname) != 0
              ansible.builtin.wait_for:
                path:
                  /tmp/proxmox_vm_clone_{{ project_fullname | default('') }}_{{
                  available_play_hosts[available_play_hosts.index(inventory_hostname) - 1] }}.done
                # Timeout is based on the number of hosts in the batch
                # Increasing the timeout by the operation timeout for each host in the batch
                timeout: "{{ proxmox_machine_operations_operation_timeout * available_play_hosts.index(inventory_hostname) }}"
          rescue:
            - name: TIMEOUT WAITING FOR PREVIOUS HOST TO FINISH CLONING
              ansible.builtin.debug:
                msg: |
                  Timeout waiting for previous host in the batch to finish cloning.
                  Moving on to avoid holding up the entire batch.

        # Cloning needs to happen on the same node where the template is located
        # After that the target node is used to move the VM to the correct node
        - name: Cloning {{ custom_vm_name | default(vm_name) }} VM...
          block:
            - name: Getting the time...
              ansible.builtin.setup:
                filter: "*_time"

            # Node is where the template is located, will not work if the template is not on the same node
            # The next task will move the VM to the correct node before starting it
            - name: Cloning {{ custom_vm_name | default(vm_name) }} VM...
              community.proxmox.proxmox_kvm:
                clone: "{{ vm_template }}"
                description: "{{ vm_description }}"
                full: "{{ false if linked_clone_status else true }}"
                name: "{{ custom_vm_name | default(vm_name) }}"
                newid: "{{ proxmox_vm_exists.proxmox_vms[0].vmid | default(machine_operations_proxmox_vmid) }}"
                node: "{{ proxmox_vm_template.proxmox_vms[0].node }}"
                pool: "{{ omit if machine_operations_proxmox_pool == {} else machine_operations_proxmox_pool }}"
                storage: "{{ proxmox_storage if not linked_clone_status else omit }}"
                target: "{{ proxmox_node }}"
                timeout: "{{ proxmox_machine_operations_operation_timeout }}"

            - name: Creating /tmp/proxmox_vm_clone_{{ project_fullname | default('') }}_{{ inventory_hostname }}.done file...
              ansible.builtin.file:
                path: /tmp/proxmox_vm_clone_{{ project_fullname | default('') }}_{{ inventory_hostname }}.done
                state: touch
                mode: "0644"

          # Using rescue to remove disks left over from failed cloning attempts
          rescue:
            # When cloning fails first making sure the limiter file is created
            # so the next host in the batch can proceed with cloning
            - name: Creating /tmp/proxmox_vm_clone_{{ project_fullname | default('') }}_{{ inventory_hostname }}.done file...
              ansible.builtin.file:
                path: /tmp/proxmox_vm_clone_{{ project_fullname | default('') }}_{{ inventory_hostname }}.done
                state: touch
                mode: "0644"

            - name: Including remove tasks to clean up disks from failed cloning attempt...
              ansible.builtin.include_tasks: remove.yml

            - name: FAILED CLONING ATTEMPT
              ansible.builtin.fail:
                msg: |
                  Cloning {{ custom_vm_name | default(vm_name) }} failed.
                  Check the errors above for this host and try again.

    # Writing the file here in case the non-existing machines are in the same batch as existing ones
    # Otherwise the non-existing will just timeout waiting for the previous host to finish cloning
    - name: Creating /tmp/proxmox_vm_clone_{{ project_fullname | default('') }}_{{ inventory_hostname }}.done file...
      ansible.builtin.file:
        path: /tmp/proxmox_vm_clone_{{ project_fullname | default('') }}_{{ inventory_hostname }}.done
        state: touch
        mode: "0644"
      when: not fresh_deploy

    - name: Migrating {{ custom_vm_name | default(vm_name) }} VM to {{ proxmox_node }} node...
      community.proxmox.proxmox_kvm:
        name: "{{ custom_vm_name | default(vm_name) }}"
        node: "{{ proxmox_node }}"
        migrate: true
      retries: 12
      delay: 5
      when: not machine_operations_proxmox_enable_ha

    - name: Resizing {{ custom_vm_name | default(vm_name) }} VM disk...
      community.proxmox.proxmox_disk:
        name: "{{ custom_vm_name | default(vm_name) }}"
        vmid: "{{ proxmox_vm_exists.proxmox_vms[0].vmid | default(machine_operations_proxmox_vmid) }}"
        disk: "{{ machine_operations_proxmox_os_disk }}"
        size: "{{ hardware_primary_disk_size }}G"
        state: resized
      # hardware_primary_disk_size variable usually comes from Providentia
      when: hardware_primary_disk_size is defined

    - name: Updating {{ custom_vm_name | default(vm_name) }} VM configuration...
      community.proxmox.proxmox_kvm:
        autostart: true
        cores: "{{ omit if not hardware_cpu else hardware_cpu }}"
        hotplug: "{{ machine_operations_proxmox_hotplug | join(',') }}"
        memory: "{{ omit if not hardware_ram else (hardware_ram * 1024) }}"
        name: "{{ custom_vm_name | default(vm_name) }}"
        node: "{{ proxmox_node }}"
        onboot: "{{ machine_operations_proxmox_vm_start_on_boot }}"
        timeout: "{{ proxmox_machine_operations_operation_timeout }}"
        update: true
        vmid: "{{ proxmox_vm_exists.proxmox_vms[0].vmid | default(machine_operations_proxmox_vmid) }}"

    - name: Attaching following networks interfaces...
      community.proxmox.proxmox_nic:
        name: "{{ custom_vm_name | default(vm_name) }}"
        vmid: "{{ proxmox_vm_exists.proxmox_vms[0].vmid | default(machine_operations_proxmox_vmid) }}"
        interface: "net{{ idx }}"
        bridge: "{{ nic.cloud_id }}"
        mtu: "{{ nic.mtu | default(1) }}"
        firewall: "{{ machine_operations_proxmox_enable_firewall }}"
      loop_control:
        loop_var: nic
        index_var: idx
        label: "{{ nic.cloud_id }}"
      loop: "{{ interfaces | selectattr('cloud_id') }}"

    - name: Checking and moving VM to pool..
      when:
        - machine_operations_proxmox_pool != {}
        - not fresh_deploy # Fresh deploy means that the VM was just created and the pool was already set during creation
      block:
        - name: Listing members for pool {{ machine_operations_proxmox_pool }}...
          ansible.builtin.uri:
            url: "{{ proxmox_api_url }}/pools/{{ machine_operations_proxmox_pool }}"
            headers:
              Authorization: PVEAPIToken={{ proxmox_defaults.api_user }}!{{ proxmox_defaults.api_token_id }}={{ proxmox_defaults.api_token_secret }}
            method: GET
            validate_certs: "{{ proxmox_defaults.validate_certs }}"
            timeout: "{{ proxmox_machine_operations_operation_timeout }}"
          register: proxmox_pool_members
          retries: 12
          delay: 5

        # Using direct API call until community.proxmox.proxmox_pool_member supports allow-move parameter
        - name: Moving {{ custom_vm_name | default(vm_name) }} VM to pool {{ machine_operations_proxmox_pool }}...
          ansible.builtin.uri:
            url: "{{ proxmox_api_url }}/pools/{{ machine_operations_proxmox_pool }}"
            headers:
              Authorization: PVEAPIToken={{ proxmox_defaults.api_user }}!{{ proxmox_defaults.api_token_id }}={{ proxmox_defaults.api_token_secret }}
            method: PUT
            body:
              vms: "{{ proxmox_vm_exists.proxmox_vms[0].vmid | default(machine_operations_proxmox_vmid) }}"
              allow-move: 1
            validate_certs: "{{ proxmox_defaults.validate_certs }}"
            timeout: "{{ proxmox_machine_operations_operation_timeout }}"
          when: custom_vm_name | default(vm_name) not in proxmox_pool_members.json.data.members | map(attribute='name') | map('default', '')

    - name: Checking and configuring HA...
      when: machine_operations_proxmox_enable_ha
      block:
        - name: Checking if {{ custom_vm_name | default(vm_name) }} VM is already an HA resource...
          ansible.builtin.uri:
            url: "{{ proxmox_api_url }}/cluster/ha/resources"
            headers:
              Authorization: PVEAPIToken={{ proxmox_defaults.api_user }}!{{ proxmox_defaults.api_token_id }}={{ proxmox_defaults.api_token_secret }}
            method: GET
            validate_certs: "{{ proxmox_defaults.validate_certs }}"
            timeout: "{{ proxmox_machine_operations_operation_timeout }}"
          register: proxmox_ha_resource

        - name: Enabling HA for {{ custom_vm_name | default(vm_name) }} VM...
          ansible.builtin.uri:
            url: "{{ proxmox_api_url }}/cluster/ha/resources"
            headers:
              Authorization: PVEAPIToken={{ proxmox_defaults.api_user }}!{{ proxmox_defaults.api_token_id }}={{ proxmox_defaults.api_token_secret }}
            method: POST
            body: "{{ machine_operations_proxmox_ha_configuration }}"
            body_format: json
            validate_certs: "{{ proxmox_defaults.validate_certs }}"
            timeout: "{{ proxmox_machine_operations_operation_timeout }}"
          when: proxmox_ha_resource.json.data | selectattr('sid', 'equalto', 'vm:' ~ machine_operations_proxmox_ha_configuration.sid) == []

    - name: Applying pending configuration for {{ custom_vm_name | default(vm_name) }} VM...
      when:
        - machine_operations_reconfigure_vm_on_deploy
        - not fresh_deploy
      block:
        # Using API instead of community.proxmox.proxmox_vm_info module since it reports incorrectly
        - name: Checking if {{ custom_vm_name | default(vm_name) }} has pending configuration...
          ansible.builtin.uri:
            url:
              "{{ proxmox_api_url }}/nodes/{{ proxmox_vm_exists.proxmox_vms[0].node }}/qemu/{{
              proxmox_vm_exists.proxmox_vms[0].vmid | default(machine_operations_proxmox_vmid) }}/pending"
            headers:
              Authorization: PVEAPIToken={{ proxmox_defaults.api_user }}!{{ proxmox_defaults.api_token_id }}={{ proxmox_defaults.api_token_secret }}
            method: GET
            validate_certs: "{{ proxmox_defaults.validate_certs }}"
            timeout: "{{ proxmox_machine_operations_operation_timeout }}"
          register: proxmox_vm_pending_info
          until: proxmox_vm_pending_info is not failed
          retries: 5
          delay: 3

        - name: Restarting {{ custom_vm_name | default(vm_name) }} to apply the pending configuration...
          community.proxmox.proxmox_kvm:
            name: "{{ custom_vm_name | default(vm_name) }}"
            state: restarted
            timeout: "{{ proxmox_machine_operations_operation_timeout }}"
          when: (proxmox_vm_pending_info.json.data | selectattr('pending', 'defined') | list | length) > 0

    - name: Starting {{ custom_vm_name | default(vm_name) }} VM... # noqa: no-handler
      community.proxmox.proxmox_kvm:
        name: "{{ custom_vm_name | default(vm_name) }}"
        vmid: "{{ proxmox_vm_exists.proxmox_vms[0].vmid | default(machine_operations_proxmox_vmid) }}"
        state: started
        timeout: "{{ proxmox_machine_operations_operation_timeout }}"
      retries: 6
      delay: 5

    - name: Removing cloning limiter file...
      ansible.builtin.file:
        path: /tmp/proxmox_vm_clone_{{ project_fullname | default('') }}_{{ inventory_hostname }}.done
        state: absent
