---
- name: Enabling IP forwarding...
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: 1
    sysctl_file: /etc/sysctl.d/99-ip-forwarding.conf
    state: present
    reload: true
  loop:
    - net.ipv4.ip_forward
    - net.ipv6.conf.all.forwarding
  when: firewall_allow_routing

- name: Removing legacy fw.conf file...
  ansible.builtin.file:
    path: /etc/sysctl.d/fw.conf
    state: absent

- name: Templating sysctl config...
  ansible.builtin.copy:
    src: "{{ firewall_config_file }}"
    dest: /etc/sysctl.d/98-firewall.conf
    mode: "0644"

- name: Reloading sysctl config...
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Notifying about deprecation of allow_routing variable...
  when: allow_routing is defined
  block:
    - name: THE VARIABLE allow_routing IS DEPRECATED!
      ansible.builtin.debug:
        msg: |
          The 'allow_routing' variable is deprecated. Please use 'firewall_allow_routing' instead.

    - name: SLEEPING TO READ THE DEPRECATION WARNING...
      ansible.builtin.wait_for:
        timeout: 30
      become: false
      delegate_to: localhost

- name: Including iptables config...
  ansible.builtin.include_tasks: iptables.yml
  when: mode == "iptables"

- name: Including nftables config...
  ansible.builtin.include_tasks: nftables.yml
  when: mode == "nftables"

- name: Flushing handlers...
  ansible.builtin.meta: flush_handlers
